<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8dfd0"/>
    </linearGradient>
    <radialGradient id="plate" cx="50%" cy="48%" r="45%">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="80%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </radialGradient>
    <radialGradient id="noodleBase" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a8c3a"/>
      <stop offset="100%" stop-color="#2d6b2d"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="16"/>
  <!-- Table texture lines -->
  <line x1="0" y1="50" x2="400" y2="50" stroke="#ddd5c5" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="150" x2="400" y2="150" stroke="#ddd5c5" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="250" x2="400" y2="250" stroke="#ddd5c5" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="350" x2="400" y2="350" stroke="#ddd5c5" stroke-width="0.5" opacity="0.4"/>
  <!-- Plate shadow -->
  <ellipse cx="200" cy="210" rx="155" ry="155" fill="#00000010" filter="url(#shadow)"/>
  <!-- Plate -->
  <ellipse cx="200" cy="200" rx="150" ry="150" fill="url(#plate)" stroke="#d8d8d8" stroke-width="1.5"/>
  <ellipse cx="200" cy="200" rx="135" ry="135" fill="none" stroke="#ececec" stroke-width="1"/>
  <!-- Green noodles pile -->
  <g opacity="0.95">
    <path d="M120,180 Q140,155 170,165 Q195,150 220,160 Q245,148 270,165 Q285,170 280,185" fill="#3a8c3a" opacity="0.3"/>
    <!-- Noodle strands - green -->
    <path d="M115,195 Q145,165 175,185 Q205,205 240,180 Q260,170 285,190" fill="none" stroke="#2d8c2d" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M120,185 Q155,160 180,175 Q210,190 245,170 Q270,162 290,180" fill="none" stroke="#35a035" stroke-width="4" stroke-linecap="round"/>
    <path d="M110,205 Q140,180 175,195 Q205,210 235,190 Q260,178 285,195" fill="none" stroke="#2d8c2d" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M125,175 Q150,150 185,168 Q215,180 250,162 Q275,155 290,172" fill="none" stroke="#3aaa3a" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M118,215 Q148,190 178,205 Q208,220 238,200 Q258,188 278,205" fill="none" stroke="#35a035" stroke-width="4" stroke-linecap="round"/>
    <path d="M130,165 Q160,142 190,158 Q220,172 250,155 Q270,148 282,162" fill="none" stroke="#2d8c2d" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M112,225 Q142,200 172,215 Q202,230 232,210 Q252,198 272,215" fill="none" stroke="#3a8c3a" stroke-width="4" stroke-linecap="round"/>
    <path d="M135,190 Q165,165 195,180 Q225,195 255,175 Q275,165 290,185" fill="none" stroke="#40b040" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Chili oil sauce on top -->
  <ellipse cx="200" cy="185" rx="30" ry="8" fill="#cc2200" opacity="0.35"/>
  <circle cx="185" cy="200" r="3" fill="#cc2200" opacity="0.3"/>
  <circle cx="220" cy="195" r="2.5" fill="#cc2200" opacity="0.25"/>
  <circle cx="210" cy="215" r="2" fill="#cc2200" opacity="0.2"/>
  <!-- Chicken topping -->
  <ellipse cx="200" cy="180" rx="28" ry="18" fill="#9a7530" opacity="0.85"/>
  <circle cx="192" cy="176" r="4" fill="#7a5520" opacity="0.5"/>
  <circle cx="208" cy="183" r="3.5" fill="#8a6525" opacity="0.4"/>
  <circle cx="198" cy="185" r="3" fill="#7a5520" opacity="0.45"/>
  <!-- Scallions -->
  <circle cx="194" cy="172" r="2.5" fill="#1a7a1a"/>
  <circle cx="206" cy="178" r="2" fill="#2a8a2a"/>
  <circle cx="200" cy="188" r="2.2" fill="#1a7a1a"/>
  <!-- Bok choy side -->
  <g transform="translate(265,175) rotate(15)">
    <ellipse rx="12" ry="22" fill="#3a9a3a" opacity="0.85"/>
    <ellipse rx="6" ry="15" fill="#80cc80" opacity="0.65"/>
  </g>
  <g transform="translate(255,195) rotate(25)">
    <ellipse rx="10" ry="18" fill="#3a9a3a" opacity="0.75"/>
    <ellipse rx="5" ry="12" fill="#80cc80" opacity="0.55"/>
  </g>
  <!-- Chopsticks -->
  <line x1="295" y1="100" x2="340" y2="310" stroke="#8B4513" stroke-width="4" stroke-linecap="round"/>
  <line x1="305" y1="95" x2="350" y2="305" stroke="#A0522D" stroke-width="3.5" stroke-linecap="round"/>
</svg>
