<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="plate" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="85%" style="stop-color:#f0f0f0"/>
      <stop offset="100%" style="stop-color:#d0d0d0"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#deb887"/>
      <stop offset="100%" style="stop-color:#a0784c"/>
    </radialGradient>
  </defs>
  <!-- Wood bg -->
  <rect width="400" height="400" fill="url(#bg)" rx="20"/>
  <!-- Plate -->
  <ellipse cx="200" cy="200" rx="170" ry="170" fill="url(#plate)" stroke="#c0c0c0" stroke-width="2"/>
  <ellipse cx="200" cy="200" rx="155" ry="155" fill="none" stroke="#e8e8e8" stroke-width="1"/>
  <!-- Noodles - red chili oil -->
  <g transform="translate(200,185)">
    <path d="M-80,0 Q-40,-30 0,-10 Q40,10 80,0" fill="none" stroke="#cc3300" stroke-width="5" opacity="0.9"/>
    <path d="M-70,10 Q-30,-20 10,0 Q50,20 90,10" fill="none" stroke="#dd4411" stroke-width="4" opacity="0.8"/>
    <path d="M-90,20 Q-50,-10 -10,10 Q30,30 70,20" fill="none" stroke="#cc3300" stroke-width="5" opacity="0.9"/>
    <path d="M-60,-15 Q-20,-45 20,-25 Q60,-5 80,-15" fill="none" stroke="#dd4411" stroke-width="4" opacity="0.85"/>
    <path d="M-75,30 Q-35,0 5,20 Q45,40 85,30" fill="none" stroke="#cc3300" stroke-width="5" opacity="0.8"/>
    <path d="M-85,-5 Q-45,-35 -5,-15 Q35,5 75,-5" fill="none" stroke="#bb2200" stroke-width="4" opacity="0.7"/>
  </g>
  <!-- Chicken topping -->
  <ellipse cx="200" cy="170" rx="35" ry="25" fill="#8B6914" opacity="0.85"/>
  <circle cx="190" cy="165" r="5" fill="#6B4914" opacity="0.6"/>
  <circle cx="205" cy="175" r="4" fill="#7B5914" opacity="0.5"/>
  <!-- Scallions -->
  <circle cx="195" cy="160" r="3" fill="#2d8c2d"/>
  <circle cx="208" cy="168" r="2.5" fill="#3a9c3a"/>
  <circle cx="198" cy="175" r="2" fill="#2d8c2d"/>
  <!-- Bok choy -->
  <g transform="translate(280,170) rotate(20)">
    <ellipse rx="15" ry="25" fill="#4a9c4a" opacity="0.8"/>
    <ellipse rx="8" ry="18" fill="#90c090" opacity="0.6"/>
  </g>
  <!-- Bakso (meatballs) -->
  <circle cx="145" cy="220" r="18" fill="#8c7060" stroke="#705848" stroke-width="1"/>
  <circle cx="148" cy="215" r="4" fill="#9c8070" opacity="0.5"/>
  <circle cx="175" cy="240" r="16" fill="#8c7060" stroke="#705848" stroke-width="1"/>
  <circle cx="178" cy="236" r="3.5" fill="#9c8070" opacity="0.5"/>
  <!-- Pangsit basah (steamed wontons) -->
  <g transform="translate(250,240)">
    <path d="M-12,0 Q0,-18 12,0 Q6,8 -6,8 Z" fill="#f5e6c8" stroke="#d4c4a0" stroke-width="1"/>
    <path d="M-8,0 Q0,-12 8,0" fill="none" stroke="#e0d0b0" stroke-width="0.5"/>
  </g>
  <g transform="translate(270,225)">
    <path d="M-10,0 Q0,-15 10,0 Q5,7 -5,7 Z" fill="#f5e6c8" stroke="#d4c4a0" stroke-width="1"/>
  </g>
  <!-- Pangsit kering (fried wontons) -->
  <g transform="translate(140,260)">
    <path d="M-15,0 Q-8,-12 0,-5 Q8,-12 15,0 Q8,8 0,5 Q-8,8 -15,0Z" fill="#d4a040" stroke="#b08020" stroke-width="1"/>
    <path d="M-10,0 Q-5,-8 0,-3 Q5,-8 10,0" fill="none" stroke="#c09030" stroke-width="0.5"/>
  </g>
  <g transform="translate(165,270)">
    <path d="M-12,0 Q-6,-10 0,-4 Q6,-10 12,0 Q6,6 0,4 Q-6,6 -12,0Z" fill="#d4a040" stroke="#b08020" stroke-width="1"/>
  </g>
  <!-- Chili oil drops -->
  <circle cx="230" cy="250" r="3" fill="#cc2200" opacity="0.5"/>
  <circle cx="160" cy="190" r="2.5" fill="#cc2200" opacity="0.4"/>
  <circle cx="245" cy="195" r="2" fill="#cc2200" opacity="0.45"/>
  <!-- Label -->
  <rect x="60" y="340" width="280" height="40" rx="8" fill="rgba(0,0,0,0.65)"/>
  <text x="200" y="366" text-anchor="middle" font-family="Arial,sans-serif" font-weight="bold" font-size="16" fill="white">Mie Chili Oil Komplit</text>
</svg>
